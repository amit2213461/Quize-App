<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrainBlitz Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --card: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --text: #f0f0f8;
    --muted: #888899;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #facc15;
    --radius: 18px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,92,252,0.18), transparent);
  }

  h1, h2, h3 { font-family: 'Syne', sans-serif; }

  .screen { display: none; width: 100%; max-width: 680px; }
  .screen.active { display: block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── START SCREEN ── */
  .start-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px;
    text-align: center;
  }
  .badge {
    display: inline-block;
    background: rgba(124,92,252,0.18);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  .start-card h1 { font-size: 42px; font-weight: 800; line-height: 1.1; margin-bottom: 16px; }
  .start-card h1 span { color: var(--accent); }
  .start-card p { color: var(--muted); font-size: 16px; line-height: 1.7; margin-bottom: 32px; }
  .stats-row { display: flex; justify-content: center; gap: 32px; margin-bottom: 40px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .btn-start {
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 16px 48px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-start:hover { background: #9275fd; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,92,252,0.4); }
  .btn-start:active { transform: translateY(0); }

  /* ── QUIZ SCREEN ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .q-counter { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--muted); }
  .q-counter span { color: var(--text); font-weight: 700; }
  .score-display { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--muted); }
  .score-display span { color: var(--accent); font-weight: 700; font-size: 18px; }

  .progress-bar { height: 4px; background: var(--border); border-radius: 100px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.4s ease; }

  /* Timer */
  .timer-wrap { display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .timer-ring { position: relative; width: 64px; height: 64px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle.bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-ring circle.fg { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round;
    stroke-dasharray: 170; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 36px 28px;
  }
  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 28px;
  }
  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .answer-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .answer-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,92,252,0.1); }
  .answer-btn.correct  { background: rgba(34,197,94,0.15);  border-color: var(--green); color: var(--green); }
  .answer-btn.wrong    { background: rgba(239,68,68,0.15);   border-color: var(--red);   color: var(--red); }
  .answer-btn:disabled { cursor: default; }

  .feedback-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
  }
  .feedback-bar.show { display: flex; animation: fadeUp 0.3s ease; }
  .feedback-bar.correct-fb { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .feedback-bar.wrong-fb   { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: var(--red); }
  .feedback-bar.timeout-fb { background: rgba(250,204,21,0.1);  border: 1px solid rgba(250,204,21,0.3); color: var(--yellow); }

  .btn-next {
    background: rgba(124,92,252,0.15);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    border-radius: 8px;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-next:hover { background: var(--accent); color: #fff; }

  /* ── RESULTS SCREEN ── */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
  }
  .results-card h2 { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
  .results-card .subtitle { color: var(--muted); margin-bottom: 32px; font-size: 15px; }
  .score-big { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; line-height: 1; }
  .score-big .denom { font-size: 36px; color: var(--muted); }
  .score-meta { margin-top: 8px; margin-bottom: 32px; color: var(--muted); font-size: 14px; }

  .result-list { display: flex; flex-direction: column; gap: 10px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
  .result-list::-webkit-scrollbar { width: 4px; }
  .result-list::-webkit-scrollbar-track { background: var(--surface); border-radius: 4px; }
  .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    font-size: 14px;
  }
  .result-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .result-q { font-weight: 500; margin-bottom: 4px; color: var(--text); }
  .result-ans { color: var(--muted); font-size: 13px; }
  .result-ans b { color: var(--green); }
  .result-ans .your-ans { color: var(--red); }

  .btn-restart {
    margin-top: 28px;
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 15px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-restart:hover { background: #9275fd; transform: translateY(-1px); }

  @media (max-width: 520px) {
    .answers { grid-template-columns: 1fr; }
    .start-card h1 { font-size: 32px; }
    .score-big { font-size: 56px; }
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="screen active" id="screen-start">
  <div class="start-card">
    <div class="badge">🧠 BrainBlitz</div>
    <h1>Test Your <span>Knowledge</span></h1>
    <p>A fast-paced general knowledge quiz across science, history, tech, and pop culture. 10 questions · 60 seconds each · Instant feedback.</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">10</div><div class="stat-label">Questions</div></div>
      <div class="stat"><div class="stat-num">60s</div><div class="stat-label">Per Question</div></div>
      <div class="stat"><div class="stat-num">−1</div><div class="stat-label">Timeout Penalty</div></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">Start Quiz →</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="q-counter">Question <span id="q-num">1</span> of 10</div>
    <div class="score-display">Score <span id="score-live">0</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>

  <div class="timer-wrap">
    <div class="timer-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="bg" cx="32" cy="32" r="27"/>
        <circle class="fg" id="timer-circle" cx="32" cy="32" r="27"/>
      </svg>
      <div class="timer-num" id="timer-num">60</div>
    </div>
  </div>

  <div class="question-card">
    <div class="question-text" id="question-text">Loading...</div>
    <div class="answers" id="answers-grid"></div>
    <div class="feedback-bar" id="feedback-bar">
      <span id="feedback-msg"></span>
      <button class="btn-next" onclick="nextQuestion()">Next →</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="screen-results">
  <div class="results-card">
    <h2 id="result-title">Quiz Complete!</h2>
    <p class="subtitle" id="result-subtitle">Here's how you did</p>
    <div class="score-big" id="score-big"></div>
    <p class="score-meta" id="score-meta"></p>
    <div class="result-list" id="result-list"></div>
    <button class="btn-restart" onclick="restartQuiz()">↻ Play Again</button>
  </div>
</div>

<script>
const QUIZ_DATA = [
  { q: "What planet is known as the Red Planet?", options: ["Venus","Mars","Jupiter","Saturn"], answer: 1 },
  { q: "Who painted the Mona Lisa?", options: ["Michelangelo","Raphael","Leonardo da Vinci","Caravaggio"], answer: 2 },
  { q: "What year was the World Wide Web invented?", options: ["1983","1989","1991","1995"], answer: 1 },
  { q: "Which element has the atomic symbol 'Au'?", options: ["Silver","Copper","Gold","Aluminium"], answer: 2 },
  { q: "What is the capital city of Japan?", options: ["Beijing","Seoul","Bangkok","Tokyo"], answer: 3 },
  { q: "Which programming language was created by Guido van Rossum?", options: ["Ruby","Python","Perl","Java"], answer: 1 },
  { q: "How many bones are in the adult human body?", options: ["186","196","206","216"], answer: 2 },
  { q: "What is the largest ocean on Earth?", options: ["Atlantic","Indian","Arctic","Pacific"], answer: 3 },
  { q: "Who wrote '1984'?", options: ["Aldous Huxley","George Orwell","Ray Bradbury","H.G. Wells"], answer: 1 },
  { q: "What does 'CPU' stand for?", options: ["Core Processing Unit","Central Processing Unit","Computer Power Unit","Central Program Utility"], answer: 1 }
];

const TIMER_MAX = 60;
const CIRCUMFERENCE = 2 * Math.PI * 27;

let state = {
  current: 0,
  score: 0,
  results: [],
  answered: false,
  timerVal: TIMER_MAX,
  timerInterval: null
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  state = { current: 0, score: 0, results: [], answered: false, timerVal: TIMER_MAX, timerInterval: null };
  showScreen('screen-quiz');
  loadQuestion();
}

function loadQuestion() {
  const q = QUIZ_DATA[state.current];
  state.answered = false;

  document.getElementById('q-num').textContent = state.current + 1;
  document.getElementById('score-live').textContent = state.score;
  document.getElementById('progress-fill').style.width = ((state.current + 1) / QUIZ_DATA.length * 100) + '%';
  document.getElementById('question-text').textContent = q.q;

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedback-bar').className = 'feedback-bar';
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerVal = TIMER_MAX;
  updateTimerUI();

  state.timerInterval = setInterval(() => {
    state.timerVal--;
    updateTimerUI();
    if (state.timerVal <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) timeoutQuestion();
    }
  }, 1000);
}

function updateTimerUI() {
  const t = state.timerVal;
  const offset = CIRCUMFERENCE * (1 - t / TIMER_MAX);
  const circle = document.getElementById('timer-circle');
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = t > 20 ? 'var(--accent)' : t > 10 ? 'var(--yellow)' : 'var(--red)';
  document.getElementById('timer-num').textContent = t;
  document.getElementById('timer-num').style.color = t > 10 ? 'var(--text)' : 'var(--red)';
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const q = QUIZ_DATA[state.current];
  const correct = idx === q.answer;
  const buttons = document.querySelectorAll('.answer-btn');

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  if (correct) state.score++;

  state.results.push({
    question: q.q,
    yourAnswer: idx,
    correctAnswer: q.answer,
    options: q.options,
    result: correct ? 'correct' : 'wrong'
  });

  showFeedback(correct ? 'correct-fb' : 'wrong-fb',
    correct ? '✓ Correct! Well done.' : `✗ Wrong. Correct answer: "${q.options[q.answer]}"`);
}

function timeoutQuestion() {
  state.answered = true;
  const q = QUIZ_DATA[state.current];
  state.score = Math.max(state.score - 1, 0);

  document.querySelectorAll('.answer-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
  });

  state.results.push({
    question: q.q,
    yourAnswer: -1,
    correctAnswer: q.answer,
    options: q.options,
    result: 'timeout'
  });

  showFeedback('timeout-fb', `⏱ Time's up! −1 point. Answer: "${q.options[q.answer]}"`);
  document.getElementById('score-live').textContent = state.score;
}

function showFeedback(cls, msg) {
  const fb = document.getElementById('feedback-bar');
  document.getElementById('feedback-msg').textContent = msg;
  fb.className = 'feedback-bar show ' + cls;
}

function nextQuestion() {
  state.current++;
  if (state.current >= QUIZ_DATA.length) { showResults(); return; }
  loadQuestion();
}

function showResults() {
  showScreen('screen-results');
  const score = state.score;
  const total = QUIZ_DATA.length;
  const pct = Math.round(score / total * 100);

  let title = pct >= 80 ? '🏆 Outstanding!' : pct >= 60 ? '👍 Good Job!' : pct >= 40 ? '📚 Keep Studying' : '😅 Better Luck Next Time';
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-subtitle').textContent = `You scored ${pct}% on the quiz`;
  document.getElementById('score-big').innerHTML = `${score}<span class="denom"> / ${total}</span>`;

  const correct = state.results.filter(r => r.result === 'correct').length;
  const wrong   = state.results.filter(r => r.result === 'wrong').length;
  const timeout = state.results.filter(r => r.result === 'timeout').length;
  document.getElementById('score-meta').textContent = `✓ ${correct} correct  ✗ ${wrong} wrong  ⏱ ${timeout} timed out`;

  const list = document.getElementById('result-list');
  list.innerHTML = '';
  state.results.forEach((r, i) => {
    const icon = r.result === 'correct' ? '✅' : r.result === 'timeout' ? '⏱' : '❌';
    const yourText = r.yourAnswer === -1
      ? `<span class="your-ans">Timed out</span>`
      : `<span class="your-ans">You: ${r.options[r.yourAnswer]}</span>`;
    const correctText = `<b>Correct: ${r.options[r.correctAnswer]}</b>`;

    list.innerHTML += `
      <div class="result-item">
        <div class="result-icon">${icon}</div>
        <div>
          <div class="result-q">Q${i + 1}: ${r.question}</div>
          <div class="result-ans">${r.result !== 'correct' ? yourText + ' · ' : ''}${correctText}</div>
        </div>
      </div>`;
  });
}

function restartQuiz() { startQuiz(); }
</script>
</body>
</html>
